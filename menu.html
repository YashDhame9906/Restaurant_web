<!DOCTYPE html>
            <h2 class="section-title">Popular Categories</h2>
            <link rel="stylesheet" href="css/style.css">
               <button class="filter-btn" data-filter="burger">Burger</button>
        <button class="filter-btn" data-filter="pasta">Pasta</button>
    <!-- Search & Filter Bar -->
<div class="menu-controls">
    <input type="text" id="searchInput" placeholder="Search food...">

    <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="pizza">Pizza</button>
     </div>
</div>

            <div class="menu-grid">

                <!-- Pizza -->
                <div class="menu-card" data-category="pizza">
                    <img src="images/pizza.jpg" alt="Pizza">
                    <div class="menu-card-content">
                        <h3>Margherita Pizza</h3>
                        <p>Classic cheese pizza with fresh basil.</p>
                        <div class="menu-footer">
                            <span>₹299</span>
                            <button
                                class="btn btn-small add-to-cart"
                                data-name="Margherita Pizza"
                                data-price="299">
                                Add to Cart
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Burger -->
                <div class="menu-card" data-category="burger">
                    <img src="images/burger.jpg" alt="Burger">
                    <div class="menu-card-content">
                        <h3>Cheese Burger</h3>
                        <p>Juicy burger with cheddar cheese.</p>
                        <div class="menu-footer">
                            <span>₹249</span>
                            <button
                                class="btn btn-small add-to-cart"
                                data-name="Cheese Burger"
                                data-price="249">
                                Add to Cart
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Pasta -->
                <div class="menu-card" data-category="pasta">
                    <img src="images/pasta.jpg" alt="Pasta">
                    <div class="menu-card-content">
                        <h3>Creamy Pasta</h3>
                        <p>Italian pasta in rich white sauce.</p>
                        <div class="menu-footer">
                            <span>₹349</span>
                            <button
                                class="btn btn-small add-to-cart"
                                data-name="Creamy Pasta"
                                data-price="349">
                                Add to Cart
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <script src="js/script.js"></script>
    <!-- Toast Notification Container -->
<div id="toast" class="toast"></div>
</body>
</html>
