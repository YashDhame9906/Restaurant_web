<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | FoodieHub</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <!-- Simple Header -->
    <header class="header">
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; padding:20px 0;">
            <a href="index.html" class="logo">FoodieHub</a>

            <!-- Cart Icon -->
            <a href="cart.html" class="cart-icon" style="position:relative; font-size:24px; color:#000; text-decoration:none;">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cartCount"
                      style="position:absolute; top:-10px; right:-12px; background:#e63946; color:#fff; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px;">
                    0
                </span>
            </a>
        </div>
    </header>
    <!-- Page Hero -->
    <section class="page-hero" style="padding:80px 0; text-align:center; background:#f8f9fa;">
        <div class="container">
            <h1>Our Delicious Menu</h1>
            <p>Choose your favorite dishes and add them to your cart.</p>
        </div>
    </section>
     <!-- Menu Section -->
    <section class="menu section" style="padding:80px 0;">
        <div class="container">
            <h2 class="section-title">Popular Dishes</h2>

            <div class="menu-grid">

                <!-- Pizza -->
                <div class="menu-card">
                    <img src="images/pizza.jpg" alt="Margherita Pizza">
                    <div class="menu-card-content">
                        <h3>Margherita Pizza</h3>
                        <p>Classic cheese pizza with fresh basil.</p>
                        <div class="menu-footer">
                            <span>₹299</span>
                            <button
                                class="btn btn-small add-to-cart"
                                data-name="Margherita Pizza"
                                data-price="299">
                                Add to Cart
                            </button>
                        </div>
                    </div>
                </div>
                 <!-- Burger -->
                <div class="menu-card">
                    <img src="images/burger.jpg" alt="Cheese Burger">
                    <div class="menu-card-content">
                        <h3>Cheese Burger</h3>
                        <p>Juicy burger with cheddar cheese.</p>
                        <div class="menu-footer">
                            <span>₹249</span>
                            <button
                                class="btn btn-small add-to-cart"
                                data-name="Cheese Burger"
                                data-price="249">
                                Add to Cart
                            </button>
                        </div>
                    </div>
                </div>
                  <!-- Pasta -->
                <div class="menu-card">
                    <img src="images/pasta.jpg" alt="Creamy Pasta">
                    <div class="menu-card-content">
                        <h3>Creamy Pasta</h3>
                        <p>Italian pasta in rich white sauce.</p>
                        <div class="menu-footer">
                            <span>₹349</span>
                            <button
                                class="btn btn-small add-to-cart"
                                data-name="Creamy Pasta"
                                data-price="349">
                                Add to Cart
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>
      <!-- Toast Container (Optional) -->
    <div id="toast" class="toast"></div>

    <!-- JavaScript -->
    <script src="js/menu.js"></script>
</body>
</html>
